name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm run test -- --run

  deploy-supabase-functions:
    if: github.ref == 'refs/heads/main' && secrets.SUPABASE_ACCESS_TOKEN && secrets.SUPABASE_PROJECT_REF
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install supabase CLI
        run: npm install -g supabase
      - name: Deploy Supabase function(s)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        # functions are stored under src/supabase/functions in this repo
        working-directory: src
        run: |
          # deploy server functions in src/supabase/functions/server
          supabase functions deploy server --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --token $SUPABASE_ACCESS_TOKEN
